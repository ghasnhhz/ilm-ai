name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Offline-safe defaults so import + config succeed without real services.
      DEV_FAKE_EMBEDDINGS: "1"
      DATABASE_URL: postgresql+psycopg2://ilm:ilm@localhost:5432/ilm
      JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        # npm install (not npm ci): the lockfile is generated on Windows and omits
        # Linux-only optional deps (@emnapi/*), which npm ci rejects. Matches the
        # frontend Dockerfile, which also uses npm install.
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
