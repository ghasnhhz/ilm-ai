# Production compose for self-hosting on a VPS. Unlike docker-compose.yml (dev), this
# bakes the app into images (no source bind mounts), restarts on failure, and runs DB
# migrations once before the backend serves traffic.
#
# Usage:
#   cp .env.example .env   # fill in real secrets
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ilm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ilm}
      POSTGRES_DB: ${POSTGRES_DB:-ilm}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ilm} -d ${POSTGRES_DB:-ilm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: apply migrations (and create pgvector) before the backend starts.
  migrate:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://ilm:ilm@db:5432/ilm}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://ilm:ilm@db:5432/ilm}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  pgdata:
